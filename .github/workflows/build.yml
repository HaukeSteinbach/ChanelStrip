name: Build VST3

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PLUGIN_VERSION: "1.0.1"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmake_generator: "Ninja"
            artifact_path: "build/SteinbachChanelStrip_artefacts/Release/VST3"
            artifact_name: "SteinbachChanelStrip-Windows-VST3"
          - os: macos-latest
            cmake_generator: "Ninja"
            artifact_path: "build/SteinbachChanelStrip_artefacts/Release/VST3"
            artifact_name: "SteinbachChanelStrip-macOS-VST3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "${{ matrix.cmake_generator }}" -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -G "${{ matrix.cmake_generator }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload SteinbachChanelStrip VST3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload SteinbachConsole VST3 (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SteinbachConsole-Windows-VST3
          path: build/SteinbachConsole_artefacts/Release/VST3
          if-no-files-found: error

      # ── Windows NSIS Installer ──────────────────────────────────────────────
      - name: Stage VST3 for installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Leerzeichen im Bundlenamen vermeiden (NSIS behandelt sonst .vst3 als Datei-Pattern)
          $src = "build\SteinbachChanelStrip_artefacts\Release\VST3\Steinbach Chanel Strip.vst3"
          New-Item -ItemType Directory -Force installer\stage\vst3bundle
          Copy-Item -Recurse "$src\*" installer\stage\vst3bundle\

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build NSIS installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: makensis /DVERSION=${{ env.PLUGIN_VERSION }} installer\SteinbachChanelStrip.nsi

      - name: Upload Windows Installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SteinbachChanelStrip-Windows-Installer
          path: SteinbachChanelStrip-${{ env.PLUGIN_VERSION }}-Setup.exe
          if-no-files-found: error
